<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 1200 320"
  preserveAspectRatio="xMidYMid meet"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">Usinik Usinagem Industrial</title>
  <desc id="desc">Logo da Usinik Usinagem Industrial em preto e vermelho.</desc>
  <rect width="1200" height="320" fill="#ffffff"/>
  <g fill="#050505">
    <text
      x="60"
      y="170"
      font-family="Arial Black, Arial, Helvetica, sans-serif"
      font-size="170"
      font-weight="900"
      letter-spacing="-6"
      textLength="1080"
      lengthAdjust="spacingAndGlyphs"
    >
      USINIK
    </text>
  </g>
  <g fill="none" stroke="#df1717" stroke-width="10">
    <rect x="92" y="194" width="760" height="78" rx="10" ry="10"/>
  </g>
  <text
    x="122"
    y="250"
    font-family="Arial Black, Arial, Helvetica, sans-serif"
    font-size="64"
    font-weight="900"
    letter-spacing="1.5"
    textLength="700"
    lengthAdjust="spacingAndGlyphs"
    fill="#df1717"
  >
    USINAGEM INDUSTRIAL
  </text>
  <g fill="#df1717">
    <polygon points="470,48 490,16 528,16 548,48 528,80 490,80"/>
    <circle cx="509" cy="48" r="12" fill="#ffffff"/>
    <polygon points="780,48 800,16 838,16 858,48 838,80 800,80"/>
    <circle cx="819" cy="48" r="12" fill="#ffffff"/>
  </g>
</svg>
